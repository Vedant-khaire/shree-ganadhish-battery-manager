<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shree Ganadhish Auto Ele & Battery Services - Battery Guarantee & Udhari Manager">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shree Ganadhish">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Shree Ganadhish Battery Manager</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Premium dark-themed splash screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0f172a; /* Slate 900 */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .spinner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .splash-logo {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
      background-color: #1e293b;
      padding: 8px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #ff5722; /* Primary brand orange color */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .loading-text {
      color: #f8fafc; /* Slate 50 */
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .loading-subtext {
      color: #94a3b8; /* Slate 400 */
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      letter-spacing: 0.2px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Custom Loading Splash Screen -->
  <div id="loading">
    <div class="spinner-container">
      <img src="icons/Icon-192.png" alt="Shree Ganadhish Logo" class="splash-logo">
      <div class="spinner"></div>
      <div class="loading-text">Shree Ganadhish</div>
      <div class="loading-subtext">Auto Ele & Battery Services</div>
    </div>
  </div>

  <script>
    window.deferredPrompt = null;
    
    // Capture beforeinstallprompt event
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      console.log('beforeinstallprompt fired and captured.');
      // Notify Flutter app that app is installable
      window.dispatchEvent(new Event('pwa-installable'));
    });

    // Capture appinstalled event
    window.addEventListener('appinstalled', (evt) => {
      console.log('App was successfully installed');
      window.deferredPrompt = null;
      window.dispatchEvent(new Event('pwa-installable'));
    });

    // Interface for Dart JS-Interop
    window.isPWAInstallable = function() {
      return window.deferredPrompt !== null;
    };

    window.installPWA = function() {
      if (window.deferredPrompt) {
        window.deferredPrompt.prompt();
        window.deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the PWA install prompt');
          } else {
            console.log('User dismissed the PWA install prompt');
          }
          window.deferredPrompt = null;
          // Notify of state change
          window.dispatchEvent(new Event('pwa-installable'));
        });
      } else {
        alert('App is already installed or your browser does not support installation.');
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
